[tool:pytest]
# pytest配置文件

# 测试发现配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# 标记定义
markers =
    unit: 标记单元测试
    integration: 标记集成测试
    slow: 标记运行较慢的测试
    audio: 标记需要音频设备的测试
    gpu: 标记需要GPU的测试
    model: 标记需要模型文件的测试
    network: 标记需要网络连接的测试

# 最小版本要求
minversion = 6.0

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:torch.*
    ignore::UserWarning:onnxruntime.*

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（如果使用pytest-cov）
# addopts = --cov=src --cov-report=html --cov-report=term